<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lumo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #2c001e 0%, #1a0614 40%, #10182e 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  .branding {
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #e95420;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }
  .search-container {
    width: min(90%, 520px);
  }
  .search-box {
    width: 100%;
    padding: 14px 20px;
    font-size: 1.1rem;
    border: 1px solid #77216f;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box::placeholder {
    color: #aea79f;
  }
  .search-box:focus {
    border-color: #e95420;
    box-shadow: 0 0 0 2px rgba(233, 84, 32, 0.25);
  }
  .shortcuts {
    display: flex;
    gap: 24px;
    margin-top: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #aea79f;
    font-size: 0.75rem;
    width: 72px;
    transition: color 0.15s;
  }
  .shortcut:hover { color: #fff; }
  .shortcut-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(119, 33, 111, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .shortcut:hover .shortcut-icon {
    background: rgba(233, 84, 32, 0.15);
    border-color: #e95420;
  }
  .clock {
    position: absolute;
    bottom: 24px;
    font-size: 0.85rem;
    color: #77216f;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="branding">Lumo</div>
  <div class="search-container">
    <form action="https://lite.duckduckgo.com/lite/" method="get">
      <input class="search-box" type="text" name="q"
             placeholder="Search DuckDuckGo" autofocus>
    </form>
  </div>
  <div class="shortcuts">
    <a class="shortcut" href="https://lite.duckduckgo.com">
      <div class="shortcut-icon">&#x1F50D;</div>
      <span>Search</span>
    </a>
    <a class="shortcut" href="https://en.m.wikipedia.org">
      <div class="shortcut-icon">&#x1F4D6;</div>
      <span>Wikipedia</span>
    </a>
    <a class="shortcut" href="https://github.com">
      <div class="shortcut-icon">&#x2699;</div>
      <span>GitHub</span>
    </a>
    <a class="shortcut" href="https://news.ycombinator.com">
      <div class="shortcut-icon">&#x1F4F0;</div>
      <span>HN</span>
    </a>
    <a class="shortcut" href="https://weather.gov">
      <div class="shortcut-icon">&#x26C5;</div>
      <span>Weather</span>
    </a>
  </div>
  <div class="clock" id="clock"></div>
  <script>
    function updateClock() {
      var d = new Date();
      var h = d.getHours(), m = d.getMinutes();
      document.getElementById('clock').textContent =
        (h % 12 || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' +
        (h < 12 ? 'AM' : 'PM');
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
